<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>nodary — local inbox analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #f5f6f8; --panel: #ffffff; --line: #e2e5ea; --text: #1c2530;
    --dim: #68727e; --faint: #98a1ac;
    --t0: #a05a1c; --t0-bg: #f7ede2; --t1: #8a7420; --t1-bg: #f6f1dd;
    --t2: #2c7a55; --t2-bg: #e2f1e9; --t3: #2b6cb0; --t3-bg: #e3edf8;
    --hot: #c0392b; --warm: #b05a1c; --ok: #8a949e;
    --hot-bg: #f9e9e7; --shadow: 0 1px 2px rgba(16, 24, 32, .06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101418; --panel: #181e24; --line: #262e37; --text: #d7dde3;
      --dim: #8a949e; --faint: #5c6670;
      --t0: #cf9257; --t0-bg: #2a2118; --t1: #bfa84e; --t1-bg: #272316;
      --t2: #63ab87; --t2-bg: #16241d; --t3: #6a9fd4; --t3-bg: #16202b;
      --hot: #e06c5f; --warm: #cf9257; --ok: #68727e;
      --hot-bg: #2b1a18; --shadow: none;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
               system-ui, sans-serif; }
  .num { font-family: ui-monospace, "SF Mono", Menlo, monospace;
         font-variant-numeric: tabular-nums; }

  header { padding: 18px 24px 14px; display: flex; gap: 14px;
           align-items: baseline; flex-wrap: wrap; max-width: 980px;
           margin: 0 auto; }
  header h1 { font-size: 18px; font-weight: 650; margin: 0;
              letter-spacing: .01em; }
  header .sub { color: var(--faint); font-size: 13px; }
  header .stat { color: var(--dim); font-size: 13px; margin-left: auto; }
  #warn { flex-basis: 100%; color: var(--hot); font-size: 13px; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; max-width: 980px;
             margin: 0 auto; padding: 0 24px 14px; }
  .filters button { background: var(--panel); color: var(--dim);
    border: 1px solid var(--line); border-radius: 999px; padding: 4px 13px;
    font: inherit; font-size: 13px; cursor: pointer; box-shadow: var(--shadow); }
  .filters button:hover { color: var(--text); }
  .filters button.on { color: var(--text); border-color: var(--dim);
                       font-weight: 550; }

  main { padding: 0 24px 48px; max-width: 980px; margin: 0 auto; }
  .msg { border: 1px solid var(--line); border-radius: 10px; margin: 10px 0;
         background: var(--panel); overflow: hidden; box-shadow: var(--shadow); }
  .row { display: flex; gap: 14px; align-items: center; padding: 12px 16px;
         cursor: pointer; }
  .row:hover { background: color-mix(in srgb, var(--panel) 92%, var(--dim)); }

  .ring { flex: none; width: 44px; height: 44px; position: relative; }
  .ring svg { display: block; transform: rotate(-90deg); }
  .ring .track { stroke: var(--line); }
  .ring .val { position: absolute; inset: 0; display: flex;
               align-items: center; justify-content: center;
               font-size: 13px; font-weight: 700; }
  .sev-hi   { color: var(--hot); }  .sev-hi .arc  { stroke: var(--hot); }
  .sev-mid  { color: var(--warm); } .sev-mid .arc { stroke: var(--warm); }
  .sev-lo   { color: var(--ok); }   .sev-lo .arc  { stroke: var(--ok); }

  .avatar { flex: none; width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 650; color: var(--panel); }

  .who { flex: 1; min-width: 0; }
  .who .name { display: block; font-weight: 600; overflow: hidden;
               text-overflow: ellipsis; white-space: nowrap; }
  .who .addr { display: block; color: var(--dim); font-size: 13px;
               overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .tier { flex: none; font-size: 12px; font-weight: 550; padding: 2px 10px;
          border-radius: 999px; white-space: nowrap; }
  .tier.t0 { color: var(--t0); background: var(--t0-bg); }
  .tier.t1 { color: var(--t1); background: var(--t1-bg); }
  .tier.t2 { color: var(--t2); background: var(--t2-bg); }
  .tier.t3 { color: var(--t3); background: var(--t3-bg); }

  .meta { flex: none; color: var(--dim); font-size: 13px; text-align: right;
          white-space: nowrap; }
  .meta .when { color: var(--faint); }

  .flags { border-top: 1px solid var(--line); padding: 12px 16px 14px 74px;
           display: none; }
  .msg.open .flags { display: block; }
  .flag { display: flex; gap: 10px; align-items: baseline; margin: 7px 0; }
  .flag .pts { flex: none; min-width: 52px; text-align: right;
               color: var(--hot); font-size: 13px; font-weight: 650; }
  .flag .bar { flex: none; width: 72px; height: 5px; border-radius: 3px;
               background: var(--line); overflow: hidden; align-self: center; }
  .flag .bar i { display: block; height: 100%; background: var(--hot); }
  .flag .why { color: var(--text); font-size: 14px; }
  .flag .fname { color: var(--faint); font-size: 12px; }
  .clean { color: var(--dim); font-size: 13px; }
  .openmail { display: inline-block; margin-top: 10px; font-size: 13px;
              color: var(--t3); text-decoration: none;
              border: 1px solid var(--line); border-radius: 6px;
              padding: 3px 10px; }
  .openmail:hover { border-color: var(--t3); }
  .empty { color: var(--dim); padding: 48px 0; text-align: center; }
  .empty code { font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>nodary</h1>
  <span class="sub">local inbox analysis — nothing leaves this machine</span>
  <span class="stat num" id="stats">loading…</span>
  <span id="warn"></span>
</header>
<div class="filters" id="filters">
  <button data-tier="" class="on">all</button>
  <button data-tier="3">tier 3 · two-way</button>
  <button data-tier="2">tier 2 · one-way</button>
  <button data-tier="1">tier 1 · org known</button>
  <button data-tier="0">tier 0 · never seen</button>
</div>
<main id="list"></main>
<script>
const esc = s => (s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const TIER_SHORT = {0: "never seen", 1: "org known", 2: "one-way", 3: "two-way"};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(ts) {
  const d = new Date(ts * 1000), now = new Date();
  const hm = String(d.getHours()).padStart(2, "0") + ":" +
             String(d.getMinutes()).padStart(2, "0");
  const sameDay = (a, b) => a.toDateString() === b.toDateString();
  if (sameDay(d, now)) return "today " + hm;
  const yday = new Date(now); yday.setDate(now.getDate() - 1);
  if (sameDay(d, yday)) return "yesterday " + hm;
  const md = MONTHS[d.getMonth()] + " " + d.getDate();
  return d.getFullYear() === now.getFullYear()
    ? md + ", " + hm : md + " " + d.getFullYear();
}

// Deterministic avatar hue from the normalized address (local, no lookups).
function hue(s) {
  let h = 0;
  for (const c of s) h = (h * 31 + c.codePointAt(0)) >>> 0;
  return h % 360;
}
function initials(name, addr) {
  const src = (name || "").trim() || addr;
  const parts = src.split(/[\s._@-]+/).filter(Boolean);
  return ((parts[0]?.[0] || "?") + (parts[1]?.[0] || "")).toUpperCase();
}

function scoreRing(score) {
  const sev = score >= 30 ? "hi" : score >= 10 ? "mid" : "lo";
  const r = 19, c = 2 * Math.PI * r;
  const filled = (Math.min(score, 100) / 100) * c;
  return `<span class="ring sev-${sev}" title="anomaly score ${score.toFixed(1)} / 100">` +
    `<svg width="44" height="44" viewBox="0 0 44 44" fill="none" aria-hidden="true">` +
    `<circle class="track" cx="22" cy="22" r="${r}" stroke-width="3.5"/>` +
    `<circle class="arc" cx="22" cy="22" r="${r}" stroke-width="3.5"` +
    ` stroke-linecap="round" stroke-dasharray="${filled.toFixed(1)} ${c.toFixed(1)}"/>` +
    `</svg><span class="val num">${score.toFixed(0)}</span></span>`;
}

async function loadStatus() {
  const s = await (await fetch("/api/status")).json();
  document.getElementById("stats").textContent =
    `${s.incoming} incoming · ${s.senders} senders · ${s.messages} messages`;
  if (s.encryption !== "sqlcipher")
    document.getElementById("warn").textContent = "⚠ database not encrypted (sqlcipher not installed)";
}

async function loadMessages(tier) {
  const q = tier === "" ? "" : `&tier=${tier}`;
  const msgs = await (await fetch(`/api/messages?limit=300${q}`)).json();
  const list = document.getElementById("list");
  if (!msgs.length) { list.innerHTML = '<div class="empty">no scored messages — run <code>nodary sync</code></div>'; return; }
  list.innerHTML = msgs.map(m => {
    const flags = m.features.length
      ? m.features.map(f =>
          `<div class="flag"><span class="pts num">+${f.contribution.toFixed(1)}</span>` +
          `<span class="bar"><i style="width:${Math.min(100, f.contribution / 25 * 100).toFixed(0)}%"></i></span>` +
          `<span class="why">${esc(f.explanation)} ` +
          `<span class="fname num">${esc(f.feature)} (${f.raw_value}×${f.weight})</span></span></div>`).join("")
      : `<div class="clean">no anomalies vs this sender's baseline (${m.baseline_n} msgs)</div>`;
    // nodary stores no message content; view the mail itself in your client.
    // Apple Mail (macOS) resolves message://<Message-ID> via Spotlight.
    const open = m.message_id
      ? `<a class="openmail" href="message://${encodeURIComponent(m.message_id)}"` +
        ` onclick="event.stopPropagation()">open in Apple Mail ↗</a>`
      : "";
    return `<div class="msg"><div class="row" onclick="this.parentNode.classList.toggle('open')">` +
      scoreRing(m.anomaly_score) +
      `<span class="avatar" style="background:hsl(${hue(m.from_email_norm)} 40% 52%)">` +
      `${esc(initials(m.from_display_name, m.from_email_norm))}</span>` +
      `<span class="who"><span class="name">${esc(m.from_display_name || m.from_email_norm)}</span>` +
      `<span class="addr">${esc(m.from_email_norm)}</span></span>` +
      `<span class="tier t${m.tier}" title="${esc(m.tier_label)}">T${m.tier} ${TIER_SHORT[m.tier]}</span>` +
      `<span class="meta num">${m.n_attachments ? "📎" + m.n_attachments + " " : ""}` +
      `${m.n_links ? "🔗" + m.n_links + " " : ""}` +
      `<span class="when">${fmtDate(m.sent_at)}</span></span>` +
      `</div><div class="flags">${flags}${open}</div></div>`;
  }).join("");
}

let tier = "";
document.getElementById("filters").addEventListener("click", e => {
  if (e.target.tagName !== "BUTTON") return;
  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("on"));
  e.target.classList.add("on");
  tier = e.target.dataset.tier;
  loadMessages(tier);
});
loadStatus();
loadMessages("");
</script>
</body>
</html>
